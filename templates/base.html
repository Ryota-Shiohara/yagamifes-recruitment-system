<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}新規局員採用システム{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">Y</span>
        <span>新規局員採用システム</span>
      </a>
      <nav aria-label="主要メニュー">
        <a href="{{ url_for('applicant_new') }}">応募登録</a>
        <a href="{{ url_for('applicants') }}">応募者管理</a>
        <a href="{{ url_for('bureau_schedules') }}">面接枠</a>
        <a href="{{ url_for('interviewers') }}">評価入力</a>
        <a href="{{ url_for('rankings') }}">ランキング</a>
      </nav>
    </header>
    <main class="page-shell">{% block content %}{% endblock %}</main>
    <footer>授業課題用のデモシステムです。表示内容はすべて架空データです。</footer>
  </body>
</html>
